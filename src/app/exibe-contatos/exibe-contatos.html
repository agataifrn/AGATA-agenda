<table class="tabela-contatos">
  <thead>
    <tr>
      <th>Nome</th>
      <th>E-mail</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    @for (c of listaDeContatos; track c.email) {
      <tr>
        <td>{{ c.nome }}</td>
        <td>{{ c.email }}</td>
        <td>
          <button on-click="deletar(c)" class="btn-remover">Remover</button>
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="3" class="tabela-vazia">Nenhum contato na agenda.</td>
      </tr>
    }
  </tbody>
</table>
