<table class="tabela-contatos">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>E-mail</th>
      <th>Aniversário</th>
      <th>Tipo</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    @for (c of listaDeContatos; track c.email) {
      <tr>
        <td>{{ c.nome }}</td>
        <td>{{ c.telefone }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.aniversario.toLocaleDateString('pt-BR', {timeZone: 'UTC'}) }}</td>
        <td>{{ c.tipo }}</td>
        <td>
          <button on-click="deletar(c)" class="btn-remover">Remover</button>
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="6" class="tabela-vazia">Nenhum contato na agenda.</td>
      </tr>
    }
  </tbody>
</table>
